name: 'Build and Publish Docker Image to ACR'
run-name: ${{ github.event.inputs.branch }}-${{ github.event.repository.updated_at }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: 'dev'

permissions:
  id-token: write      # Required for Azure federated identity
  contents: read       # Required to checkout code

jobs:
  DockerImageBuildandPush:
    name: Docker Image Build and Push
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.event.inputs.environment }}
    
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment variables
        uses: ./.github/actions/set-env-vars-ps
        with:
          varFilePath: ./.github/variables/${{ github.event.inputs.environment }}.env

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      # NEW STEP: Authenticate Docker with your ACR
      - name: ACR Login
        run: |
          az acr login --name containerRegistryPratik1

      - name: Build and Publish Image for ACIRunners
        run: |
          REGISTRY="containerregistrypratik1.azurecr.io"
          IMAGE_TAG="$REGISTRY/ii-app-api:${{ github.run_id }}"

          docker build \
            -t "$IMAGE_TAG" \
            -f ${{ github.workspace }}/runner_container/dockerfile \
            ${{ github.workspace }}/runner_container

          docker push "$IMAGE_TAG"